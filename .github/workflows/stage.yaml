name: Deploy Stage Preview

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  Lint-and-Format:
    name: Lint with Ruff and Format with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Check Formatting
        run: uv run ruff format --check .

  Test:
    name: Test with Pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Run Tests
        run: uv run pytest

  Build-Push-Image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [Lint-and-Format, Test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev --frozen

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            nycusdc/sciedu-llm:stage
            nycusdc/sciedu-llm:${{ github.ref_name }}
            nycusdc/sciedu-llm:${{ github.sha }}
          context: .

  Deploy:
    name: Deploy
    needs: Build-Push-Image
    runs-on: ubuntu-latest
    steps:
      - name: Trigger n8n Snapshot Webhook
        run: |
          curl -X POST --location --fail-with-body 'https://webhook.sdc.nycu.club/webhook/deploy' \
            --header 'Content-Type: application/json' \
            --header 'x-deploy-token: ${{ secrets.N8N_DEPLOY_TOKEN }}' \
            --data-raw '{
            "source": {
              "title": "SciEdu",
              "repo": "${{ github.repository }}",
              "branch": "${{ github.head_ref || github.ref_name }}",
              "commit": "${{ github.sha }}"
            },
            "method": "deploy",
            "metadata": {
              "environment": "stage",
              "component": "llm"
            },
            "setup": {
              "inject_secret": {
                "enable": true,
                "project": "sciedu",
                "environment": "staging",
                "secrets": [
                  {
                    "path": "/LLM",
                    "secret_name": "NCHC_API_KEY",
                    "env_name": "OPENAI_API_KEY"
                  },
                  {
                    "path": "/LLM",
                    "secret_name": "LANGFUSE_SECRET_KEY",
                    "env_name": "LANGFUSE_SECRET_KEY"
                  },
                  {
                    "path": "/LLM",
                    "secret_name": "LANGFUSE_PUBLIC_KEY",
                    "env_name": "LANGFUSE_PUBLIC_KEY"
                  }
                ]
              }
            },
            "post": {
              "notify_discord": {
                "enable": true,
                "channel": "sciedu-activity"
              },
              "setup_domain": {
                "enable": true,
                "title": "Endpoint",
                "name": "llm.stage.sciedu.sdc.nycu.club",
                "value": "default-eng-deploy:internal"
              }
            }
          }'
