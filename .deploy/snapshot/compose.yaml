services:
  llm-provider:
    image: "nycusdc/sciedu-llm:$VERSION"
    container_name: sciedu-llm-provider-$VERSION
    networks:
      - traefik
    environment:
      HOST: 0.0.0.0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: "https://portal.genai.nchc.org.tw/api"
      OPENAI_DEFAULT_MODEL: "gpt-oss-120b"
      ALLOWED_MODELS: "gpt-oss-120b,gemma-4-31B-it"
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASE_URL: "https://langfuse-sciedu.sdc.nycu.club"
      LANGFUSE_TRACING_ENVIRONMENT: "dev"

    labels:
      - "vector.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.sciedu-llm-$VERSION.rule=Host(`llm.$VERSION.sciedu.sdc.nycu.club`)"
      - "traefik.http.routers.sciedu-llm-$VERSION.entrypoints=websecure"
      - "traefik.http.routers.sciedu-llm-$VERSION.tls=true"
      - "traefik.http.routers.sciedu-llm-$VERSION.tls.certresolver=cloudflare"
      - "traefik.http.services.sciedu-llm-$VERSION.loadbalancer.server.port=8080"

networks:
  traefik:
    external: true
